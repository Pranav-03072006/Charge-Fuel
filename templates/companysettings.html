{%load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>


<style>
    body
    {
        background-image: url('{% static 'images/contact.png'%}');
        background-size:100%;
    }

    .tabtheme
    {
        text-align: center;
        font-family: Arial;
        color: red;
        margin-top: 20px;
        margin-right: 100px;
        font-size: 25px;
        position: relative;
        animation: bankease 1s;
        text-transform: uppercase;
    }

    @keyframes bankease
        {
            from{top:-100px;}
            to{top:0px;}
        }


    a
    {
        color: red;
        text-decoration: none;
    }

    a:hover{
        color: red;
        text-decoration: underline;
    }


    .outerdiv
    {
        text-align: center;
        width: 45%;
        height: 80px;
        background-color: rgba(255,255,255,0.7);
        margin-left: 410px;
        position: relative;
        top: 50px;
        border-radius: 25px;
        border: double;
        border-color: white;
        color: white;
        background-color:rgba(0,0,0,0.2);

        transition: 0.3s;

    }

    .outerdiv:hover
    {
        transform: translateY(-10px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
    }


    .slogan
    {
        font-size: 40px;
        position: relative;
        left: 5px;
        top: -15px;
    }


    .formtheme
    {
        background-color:rgba(0,0,0,0.3);
        margin-top: 100px;
        margin-left: 460px;
        border: solid;
        border-color: white;
        width: 600px;
        height: 525px;
        border-radius: 15px;
        transition: 0.3s;
    }

    .formtheme:hover
    {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
    }

    .texttheme
    {
        width: 250%;
        height: 40px;
    }

    .buttontheme
    {

        text-align: center;
        width: 150%;
        height: 35px;
        margin-left: 120px;
        border-radius: 5px;
        margin-top: 15px;
        transition: 0.3s;
        background-color: #e7e8fd;
    }

    .buttontheme:hover
    {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.5);
    }
     .box{
        color: white;
        border-radius:40px;
        transition:transform  .5s;
    }
    .box:hover
    {
        color: white;
        transform:scale(1.3);
    }


</style>

<body>

<div style="width:100%;height:50px">
    <table width="100%" class="tabtheme">
        <tr>
            <td class="box"><a href="companydashboardlink" >Dashboard</a></td>
            <td class="box"><a href="companycustomerscodedb">Customers</a></td>
            <td class="box"><a href="companycontactcodedb">Contact</a></td>
            <td class="box"><a href="companyorderfuelcodedb">Fuel</a></td>
            <td class="box"><a href="companyorderevcodedb">EV</a></td>
            <td class="box"><a href="companysettingslink">settings</a></td>
            <td class="box"><a href="companycomplaincodedb">complain</a></td>
            <td class="box"><a href="companyfeedbackcodedb">feedback</a></td>
            <td class="box"><a href="companylink">signout</a></td>
        </tr>
    </table>
</div>




<div class="outerdiv">

    <h1 class="slogan">Company Password Change Section</h1>

</div>


<div class="formtheme">
    <form action="companysettingscodedb" method="post">
        {% csrf_token %}

<table width="230px" cellspacing="18px" style="color: white">

    <tr>
        <td>Id</td>
    </tr>

    <tr>
        <td><input type="text" name="id" placeholder="Enter id here" required="true" class="texttheme"></td>
    </tr>


    <tr>
        <td>Old Password</td>
    </tr>

    <tr>
        <td><input type="password" name="opwd" placeholder="Enter old password here" required="true" class="texttheme"></td>
    </tr>

    <tr>
        <td>New Password</td>
    </tr>

    <tr>
        <td><input type="password" placeholder="Enter new password here" name="npwd"  required="true" class="texttheme"></input> </td>
    </tr>
     <td>Confirm New Password</td>
    </tr>

    <tr>
        <td><input type="password" placeholder="Enter confirm new password here" name="cnpwd" required="true" class="texttheme"></input> </td>
    </tr>


    <tr>
        <td><input type="submit" value="Send" class="buttontheme"></td>
    </tr>
    <tr>
        <td> {{ contact_msg }}</td>
    </tr>



</table>








</form>
</div>
</body>
</html>
