    body{

        background-repeat: no-repeat;

    .tabtheme{
        text-transform:uppercase;
        text-align:left;
        margin-left: 100px;
        font-family: Arial;
        text-decoration: none;
        height:100px;
        width:1300px;
        font-size:25px;
        position: relative;
        animation: bankease1 1s;
    }

    @keyframes bankease1
        {
            from{top:-100px;}
            to{top:0px;}
        }

    a{
        text-decoration: none;
    }

    a:hover{
        color: darkorange;

    }

    .buttontheme{
        text-align:center;

        margin-top: 630px;

        color: white;
    }
     .box{
        color: darkorange;
        border-radius:40px;
        transition:transform  .5s;
    }
    .box:hover
    {
        color: darkorange;
        transform:scale(1.3);

    }
    .box1{
        color: white;

        transition:transform  .5s;
    }
    .box1:hover

    .box2{
