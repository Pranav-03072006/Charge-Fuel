{%load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>


<style>
    body
    {
        background-image: url('{% static 'images/contact.png'%}');
        background-size:100%;
    }

    .tabtheme
    {
        text-align: center;
        font-family: Arial;
        color: darkorange;
        margin-top: 20px;
        margin-right: 100px;
        font-size: 30px;
        position: relative;
        animation: bankease 1s;
        text-transform: uppercase;


    }

    @keyframes bankease
        {
            from{top:-100px;}
            to{top:0px;}
        }


    a
    {
        color: darkorange;
        text-decoration: none;
    }

    a:hover{
        color: darkorange;
        text-decoration: underline;
    }


    .outerdiv
    {

        width: 35%;
        height: 80px;
        background-color: rgb(255,255,255,0.7);
        margin-left: 500px;
        position: relative;
        top: 100px;
        border-radius: 25px;
        border: double;
        border-color: white;
        color: white;
        background-color:rgba(0,0,0,0.2);

        transition: 0.3s;

    }

    .outerdiv:hover
    {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
    }


    .slogan
    {
        font-size: 40px;
        position: relative;
        left: 30px;
        top: -10px;
    }


    .box{
        color: #18312e;
        border-radius:40px;
        transition:transform  .5s;
    }
    .box:hover
    {
        color: #18312e;
        transform:scale(1.3);
    }

    .formtheme
    {
        background-color:rgba(0,0,0,0.3);
        margin-top: 140px;
        margin-left: 465px;
        border: solid;
        border-color: white;
        width: 600px;
        height: 350px;
        border-radius: 15px;
        transition: 0.3s;
    }

    .formtheme:hover
    {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
    }

    .texttheme
    {
        width: 250%;
        height: 40px;
    }

    .buttontheme
    {

        text-align: center;
        width: 150%;
        height: 35px;
        margin-left: 120px;
        border-radius: 5px;
        margin-top: 30px;
        transition: 0.3s;
        background-color: #e7e8fd;
    }

    .buttontheme:hover
    {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.5);
    }


</style>

<body>

<table width="100%" class="tabtheme" align="center">
        <tr>
            <td class="box"><a href="customerdashboardlink" style="color: white">Dashboard</a></td>
            <td class="box"><a href="orderlink" style="color: white">Order</a></td>
            <td class="box"><a href="settingslink" style="color: white">settings</a></td>
            <td class="box"><a href="complainlink" style="color: white">complain</a></td>
            <td class="box"><a href="feedbacklink" style="color: white">feedback</a></td>
            <td class="box"><a href="accountslink" style="color: white">accounts</a></td>
            <td class="box"><a href="homelink" style="color: white">signout</a></td>
        </tr>
    </table>




<div class="outerdiv">

    <h1 class="slogan">Customer Feedback Section</h1>

</div>


<div class="formtheme">
    <form action="feedbackcodedb" method="post">
        {% csrf_token %}

<table width="230px" cellspacing="18px" style="color: white">

    <tr>
        <td>Id</td>
    </tr>

    <tr>
        <td><input type="text" name="id" placeholder="Enter id here" required="true" class="texttheme"></td>
    </tr>



     <td>Feedback</td>
    </tr>

    <tr>
        <td><textarea name="feedback" placeholder="Enter feedback here"  required="true" class="texttheme"></textarea> </td>
    </tr>


    <tr>
        <td><input type="submit" value="SUBMIT" class="buttontheme"></td>
    </tr>
    <tr>
        <td> {{ feedback_msg }}</td>
    </tr>



</table>

</form>
</div>
</body>
</html>
