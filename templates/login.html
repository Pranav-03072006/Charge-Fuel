<!DOCTYPE html>
<html lang="en">
<head>

</head>
<style>
    body{
        background-image:url('{% static 'images/login.gif'%}');
        background-size:100%;
    }
    .tabtheme{
        text-transform:uppercase;
        text-align:center;
        font-family: Arial;
        text-decoration: none;
        height:100px;
        width:1000px;
        font-size:25px;
        box-shadow: 10px 10px 10px;
    }
    {#.buttontheme{#}
    {#    text-align:center;#}
    {#    font-family: "Arial Black";#}
    {#    text-decoration: none;#}
    {#    margin-left: -280px;#}

    {#}#}
    {#.wwwtheme{#}
    {#    text-align:center;#}

    {#    margin-left: 180px;#}

    {#    font-size: 28px;#}
    {#    color: black;#}
    {#}#}
    a{
    text-decoration: none;
    }
    .texttheme
    {
        background-color:white;
        background-image:url('{% static 'images/ID.jpg' %}');
        background-size:10%;
        background-repeat: no-repeat;
        background-position-x: right;
        width:80%;
        height:50px;
        border:solid;
        color: black;
    }
    .texttheme1
    {
        background-color:white;
        background-image:url('{% static 'images/password.png' %}');
        background-size:9%;
        background-repeat: no-repeat;
        background-position-x: right;
        width:80%;
        height:50px;
        border:solid;
        color: black;
    }
    .formtheme{
    font-family:arial;
        border:solid;
        border-color:white;
        width:700px;
        height:500px;
        margin-left:380px;
        margin-top: 180px;
        background-color:rgba(0,0,0,0.8);
        color:white;
        box-shadow:10px 10px 10px black;
        text-align:center;
    }
    .buttontheme{
            width:80%;
        text-align:center;
        height:50px;
        background-color:gray;
        color:white;
        font-size:20px;
        text-transform: uppercase;

        {#border-bottom-right-radius:50px;#}
        {#border-bottom-left-radius: 50px;#}

    }
    .maindiv
    {
        width: 100%;
        height: 800px;
        background-color:rgba(255,255,255,0.5);
    }



</style>
<body>
<div class="maindiv">

<div style="width:100%;height:50px">
    {{ request.session.AUTH }}
    <table width="70%" class="tabtheme" align="center">
        <tr>
            <td><a href="homelink" style="color:black">home</a></td>
            <td><a href="aboutlink" style="color:black">about</a></td>
            <td><a href="serviceslink" style="color:black">services</a></td>
            <td><a href="contactlink" style="color:black">contact</a></td>
        </tr>
    </table>
</div>
<div class="formtheme">
     <form action="logincodedb" method="post">
        {% csrf_token %}
    <table align="center" width="100%" cellspacing="20px" border="0">
        <tr STYLE="text-align:center;font-size:20px;background-color:gray;height: 40px;">
            <td>USER SIGN IN SECTION</td>
        </tr>
        <tr>
        <td>USER ID</td>
        </tr>
        <tr>
           <td><input type="text" name="uid" placeholder="Enter Id" required="true" class="texttheme"></td>
        </tr>
        <tr>
            <td>PASSWORD</td>
        </tr>
        <tr>
            <td><input type="password" name="password" placeholder="Enter Password" required="true" class="texttheme1"></td>
        </tr>
        <tr align="center">
            <td><input type="submit" value="Sign In" class="buttontheme" style="text-align: center"></td>
        </tr>
        <tr style="color:red" align="center">
            <td> Don't have an Account? <a href="signuplink" style="color:red">Sign Up</a></td>
        </tr>
        <tr>
            <td>{{ error_msg }}</td>
        </tr>
    </table>
     </form>
</div>
    </div>

</body>
</html>
