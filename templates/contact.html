{%load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>


<style>
    body
    {
        background-image: url('{% static 'images/contact.png'%}');
        background-size:100%;
    }

    .tabtheme
    {
        text-align: center;
        font-family: Arial;
        color: darkorange;
        margin-top: 20px;
        margin-right: 100px;
        font-size: 30px;
        position: relative;
        animation: bankease 1s;
        text-transform: uppercase;


    }

    @keyframes bankease
        {
            from{top:-100px;}
            to{top:0px;}
        }


    a
    {
        color: darkorange;
        text-decoration: none;
    }

    a:hover{
        color: darkorange;
        text-decoration: underline;
    }


    .outerdiv
    {

        width: 48%;
        height: 80px;
        background-color: rgba(255,255,255,0.7);
        margin-left: 410px;
        position: relative;
        top: 100px;
        border-radius: 25px;
        border: double;
        border-color: white;
        color: white;
        background-color:rgba(0,0,0,0.2);
        transition: 0.3s;

    }

    .outerdiv:hover
    {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
    }


    .slogan
    {
        font-size: 40px;
        position: relative;
        left: 25px;
        top: -38px;
    }


    .box{
        color: darkorange;
        border-radius:40px;
        transition:transform  .5s;
    }
    .box:hover
    {
        color: darkorange;
        transform:scale(1.3);
    }

    .formtheme
    {
        background-color:rgba(0,0,0,0.3);
        margin-top: 140px;
        margin-left: 500px;
        border: solid;
        border-color: white;
        width: 600px;
        height: 500px;
        border-radius: 15px;
        transition: 0.3s;
    }

    .formtheme:hover {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
    }


    .texttheme
    {
        width: 250%;
        height: 40px;
    }

    .buttontheme
    {

        text-align: center;
        width: 150%;
        height: 35px;
        margin-left: 120px;
        border-radius: 5px;
        margin-top: -10px;
        transition: 0.3s;
        background-color: #e7e8fd;
    }

    .buttontheme:hover
    {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.5);
    }


</style>

<body>

<table width="90%" class="tabtheme" align="right">

    <tr>

        <td class="box"><a href="homelink">Home</a></td>
        <td class="box"><a href="aboutlink">About</a></td>
        <td class="box"><a href="serviceslink">Services</a></td>
        <td class="box"><a href="contactlink">Contact</a></td>

    </tr>

</table>





<div class="outerdiv">

    <h1 class="slogan">Connecting you to solutions that matter</h1>

</div>


<div class="formtheme">
    <form action="contactcodedb" method="post">
        {% csrf_token %}

<table width="230px" cellspacing="18px" style="color: white">

    <tr>
        <td>Name</td>
    </tr>

    <tr>
        <td><input type="text" name="fnm1" placeholder="Enter Full Name here" required="true" class="texttheme"></td>
    </tr>

    <tr>
        <td>City</td>
    </tr>

    <tr>
        <td><select required="true" name="city1" class="texttheme">
            <option>Select City</option>
            <option>Indore</option>
            <option>Ujjain</option>
            <option>Dewas</option>
        </select> </td>
    </tr>

    <tr>
        <td>Contact</td>
    </tr>

    <tr>
        <td><input type="number" name="contact1" placeholder="Enter Contact Number here" required="true" class="texttheme"></td>
    </tr>

    <tr>
        <td>Query</td>
    </tr>

    <tr>
        <td><textarea placeholder="Enter Query here" name="query1" required="true" class="texttheme"></textarea> </td>
    </tr>


    <tr>
        <td><input type="submit" value="Send" class="buttontheme"></td>
    </tr>
    <tr>
        <td> {{ contact_msg }}</td>
    </tr>



</table>








</form>
</div>
</body>
</html>
